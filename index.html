<!DOCTYPE html>
<html>
<head>
    <title>MANA Portfolio</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            max-width:1200px;
            margin:auto;
            padding:30px;
            background:#f5f5f5;
        }

        h1{
            text-align:center;
        }

        .category{
            margin-top:40px;
        }

        .gallery{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        }

        .card{
            background:white;
            padding:10px;
            border-radius:10px;
            width:300px;
            box-shadow:0 2px 8px rgba(0,0,0,.1);
        }

        .card img{
            width:100%;
            border-radius:6px;
        }

        .card h3{
            margin-top:10px;
        }
    </style>
</head>
<body>

<h1>MANA Portfolio</h1>

<div class="category">
    <h2>Motion Graphics</h2>

    <div class="gallery">

        <div class="card">
            <img src="https://via.placeholder.com/300x180">
            <h3>Toyota Event Opener</h3>
            <p>After Effects animation.</p>
        </div>

    </div>
</div>

<div class="category">
    <h2>Graphic Design</h2>

    <div class="gallery">

        <div class="card">
            <img src="images/New Weekend Class Schedule_ English.jpg">
            <h3>Event Poster</h3>
            <p>Promotional design.</p>
        </div>

    </div>
</div>

</body>
</html>
